# Complex queries -- multi-step, WoW, retention, joins across domains
# Target: 55%+ accuracy after tuning

- question: "Week on week comparison of total successful UPI transactions"
  expected_tables: ["upi_prod.transaction_v3"]
  expected_patterns: ["COUNT", "SUCCESS", "transaction_at", "DATE_TRUNC|WEEK|DATE_SUB"]
  complexity: complex

- question: "Daily trend of UPI transaction count for the last 14 days"
  expected_tables: ["upi_prod.transaction_v3"]
  expected_patterns: ["COUNT", "transaction_at", "GROUP BY", "ORDER BY"]
  complexity: complex

- question: "Top 5 transaction types by total amount, with percentage of overall volume"
  expected_tables: ["upi_prod.transaction_v3"]
  expected_patterns: ["SUM", "transaction_type", "LIMIT"]
  complexity: complex

- question: "How many users who received a cashback reward also made a UPI transaction in the last 30 days?"
  expected_tables: ["rewards_prod.reward_v3", "upi_prod.transaction_v3"]
  expected_patterns: ["JOIN|IN|EXISTS", "sm_user_id"]
  complexity: complex

- question: "What is the average time between reward creation and payout for successful payouts?"
  expected_tables: ["rewards_prod.payouts_v3"]
