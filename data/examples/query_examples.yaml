# Few-shot SQL examples -- curated question → SQL pairs for system prompt
# Ordered by complexity: LOW, MEDIUM, HIGH

# ── LOW Complexity ──────────────────────────────────────────────

- question: "Total payouts last month"
  sql: |
    SELECT COUNT(*) as total_payouts, SUM(amount)/100 as total_amount_inr
    FROM rewards_prod.payouts_v3
    WHERE created_at >= TIMESTAMP_TRUNC(TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 1 MONTH), MONTH)
      AND created_at < TIMESTAMP_TRUNC(CURRENT_TIMESTAMP(), MONTH)
  explanation: "amount is in paisa, divide by 100 for INR. created_at is TIMESTAMP in v3."
  complexity: LOW

- question: "How many successful UPI transactions today?"
  sql: |
    SELECT COUNT(*) as successful_txns
    FROM upi_prod.transaction_v3
    WHERE TIMESTAMP_MILLIS(transaction_at) >= TIMESTAMP_TRUNC(CURRENT_TIMESTAMP(), DAY)
      AND transaction_status = 'SUCCESS'
  explanation: "Use transaction_at (not created_at) for transaction time. Timestamps are in IST."
  complexity: LOW

- question: "Number of active wallets"
  sql: |
    SELECT COUNT(*) as active_wallets
    FROM rewards_prod.wallet_v3
    WHERE status = 'ACTIVE'
  explanation: "Simple count with status filter."
  complexity: LOW

- question: "Total GMV last 7 days"
  sql: |
    SELECT SUM(amount) as total_gmv_inr
    FROM upi_prod.transaction_v3
    WHERE TIMESTAMP_MILLIS(transaction_at) >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 7 DAY)
      AND transaction_status = 'SUCCESS'
  explanation: "amount in transaction_v3 is NUMERIC in rupees. Filter SUCCESS only for net GMV."
  complexity: LOW

- question: "Count of complaints this month"
  sql: |
    SELECT COUNT(*) as complaint_count
    FROM upi_prod.complaint_v3
    WHERE TIMESTAMP_MILLIS(created_at) >= TIMESTAMP_TRUNC(CURRENT_TIMESTAMP(), MONTH)
  explanation: "created_at is epoch millis in complaint_v3."
  complexity: LOW

# ── MEDIUM Complexity ───────────────────────────────────────────

- question: "Daily payout count for the last 2 weeks"
  sql: |
    SELECT DATE(created_at) as payout_date, COUNT(*) as payout_count
    FROM rewards_prod.payouts_v3
    WHERE created_at >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 14 DAY)
    GROUP BY payout_date
    ORDER BY payout_date
  explanation: "created_at is TIMESTAMP in payouts_v3. Group by date for daily trend."
  complexity: MEDIUM

- question: "Payouts by status last 30 days"
  sql: |
    SELECT payout_status, COUNT(*) as count, SUM(amount)/100 as total_inr
    FROM rewards_prod.payouts_v3
    WHERE created_at >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)
    GROUP BY payout_status
    ORDER BY count DESC
  explanation: "Categorical breakdown by status. Amount in paisa."
  complexity: MEDIUM

- question: "UPI transaction success rate by day this week"
  sql: |
    SELECT
      DATE(TIMESTAMP_MILLIS(transaction_at)) as txn_date,
      COUNT(*) as total,
      COUNTIF(transaction_status = 'SUCCESS') as successful,
      ROUND(COUNTIF(transaction_status = 'SUCCESS') / COUNT(*) * 100, 2) as success_rate_pct
    FROM upi_prod.transaction_v3
    WHERE TIMESTAMP_MILLIS(transaction_at) >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY)
    GROUP BY txn_date
    ORDER BY txn_date
  explanation: "Use transaction_at for transaction time. COUNTIF for conditional counting. Timestamps are IST."
  complexity: MEDIUM

- question: "Top 10 reward event types by count last month"
  sql: |
    SELECT type, COUNT(*) as event_count
    FROM rewards_prod.reward_event_v3
    WHERE TIMESTAMP_MILLIS(created_at) >= TIMESTAMP_TRUNC(TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 1 MONTH), MONTH)
      AND TIMESTAMP_MILLIS(created_at) < TIMESTAMP_TRUNC(CURRENT_TIMESTAMP(), MONTH)
    GROUP BY type
    ORDER BY event_count DESC
    LIMIT 10
  explanation: "created_at is epoch millis in reward_event_v3. Use TIMESTAMP_MILLIS()."
  complexity: MEDIUM

- question: "Average payout amount by payment mode"
  sql: |
    SELECT payment_mode, ROUND(AVG(amount)/100, 2) as avg_amount_inr, COUNT(*) as count
    FROM rewards_prod.payouts_v3
    WHERE created_at >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)
      AND payout_status = 'SUCCESS'
    GROUP BY payment_mode
    ORDER BY avg_amount_inr DESC
  explanation: "Amount in paisa, divide by 100. Filter successful payouts only for meaningful averages."
  complexity: MEDIUM

- question: "Monthly active UPI users last 3 months"
  sql: |
    SELECT
      DATE_TRUNC(DATE(TIMESTAMP_MILLIS(transaction_at)), MONTH) as month,
      COUNT(DISTINCT sm_user_id) as mau
    FROM upi_prod.transaction_v3
    WHERE TIMESTAMP_MILLIS(transaction_at) >= DATE_SUB(CURRENT_DATE(), INTERVAL 3 MONTH)
      AND transaction_status = 'SUCCESS'
    GROUP BY month
    ORDER BY month
  explanation: "MAU = distinct users per month. Use sm_user_id (not upi_user_id) for unique user counts."
  complexity: MEDIUM

# ── HIGH Complexity ─────────────────────────────────────────────

- question: "Week-over-week payout count comparison"
  sql: |
    WITH current_week AS (
      SELECT COUNT(*) as count
      FROM rewards_prod.payouts_v3
      WHERE created_at >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY)
    ),
    previous_week AS (
      SELECT COUNT(*) as count
      FROM rewards_prod.payouts_v3
      WHERE created_at >= DATE_SUB(CURRENT_DATE(), INTERVAL 14 DAY)
        AND created_at < DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY)
    )
    SELECT
      cw.count as this_week,
      pw.count as last_week,
      ROUND((cw.count - pw.count) / NULLIF(pw.count, 0) * 100, 2) as wow_change_pct
    FROM current_week cw, previous_week pw
  explanation: "WoW pattern: two CTEs for each period, then compute delta percentage."
  complexity: HIGH

- question: "Top 5 payout partners by volume last month"
  sql: |
    SELECT
      payout_partner,
      COUNT(*) as payout_count,
      SUM(amount)/100 as total_amount_inr,
      ROUND(AVG(amount)/100, 2) as avg_amount_inr,
      COUNTIF(payout_status = 'SUCCESS') as successful,
      ROUND(COUNTIF(payout_status = 'SUCCESS') / COUNT(*) * 100, 2) as success_rate_pct
    FROM rewards_prod.payouts_v3
    WHERE created_at >= TIMESTAMP_TRUNC(TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 1 MONTH), MONTH)
      AND created_at < TIMESTAMP_TRUNC(CURRENT_TIMESTAMP(), MONTH)
    GROUP BY payout_partner
    ORDER BY total_amount_inr DESC
    LIMIT 5
  explanation: "Multi-metric aggregation with success rate. Amount in paisa."
  complexity: HIGH

- question: "Daily new user registrations vs first UPI transaction last 30 days"
  sql: |
    WITH new_users AS (
      SELECT DATE(creation_date) as day, COUNT(*) as new_signups
      FROM sm_kavach_svc_prod_sm_login_service.user_profile
      WHERE creation_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
      GROUP BY day
    ),
    first_txns AS (
      SELECT DATE(TIMESTAMP_MILLIS(MIN(transaction_at))) as day, COUNT(DISTINCT sm_user_id) as first_txn_users
      FROM upi_prod.transaction_v3
      WHERE TIMESTAMP_MILLIS(transaction_at) >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
        AND transaction_status = 'SUCCESS'
      GROUP BY sm_user_id
      HAVING DATE(TIMESTAMP_MILLIS(MIN(transaction_at))) >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
    )
    SELECT
      COALESCE(n.day, f.day) as day,
      IFNULL(n.new_signups, 0) as new_signups,
      IFNULL(f.first_txn_users, 0) as first_txn_users
    FROM new_users n
    FULL OUTER JOIN (SELECT day, COUNT(*) as first_txn_users FROM first_txns GROUP BY day) f ON n.day = f.day
    ORDER BY day
  explanation: "Cross-domain join between kavach (signups) and UPI (first transactions). Uses CTE for each source."
  complexity: HIGH

- question: "Cashback credited vs redeemed by month"
  sql: |
    SELECT
      DATE_TRUNC(DATE(TIMESTAMP_MILLIS(created_at)), MONTH) as month,
      ROUND(SUM(CASE WHEN type = 'CREDIT' AND source_type = 'CASHBACK' THEN amount ELSE 0 END), 2) as credited_inr,
      ROUND(SUM(CASE WHEN type = 'DEBIT' AND source_type = 'REDEMPTION' THEN amount ELSE 0 END), 2) as redeemed_inr
    FROM rewards_prod.wallet_transaction_v3
    WHERE TIMESTAMP_MILLIS(created_at) >= DATE_SUB(CURRENT_DATE(), INTERVAL 6 MONTH)
      AND status = 'SUCCESS'
    GROUP BY month
    ORDER BY month
  explanation: "Conditional aggregation with CASE WHEN for multi-metric from single table. Amount in rupees for wallet_transaction_v3."
  complexity: HIGH
